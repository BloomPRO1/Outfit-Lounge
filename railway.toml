[build]
  builder = "NIXPACKS"
  buildCommand = "cd client && npm install && npm run build && cd ../server && npm install && npm run build && cp -r src/db/migrations dist/db/"

[deploy]
  startCommand = "cd server && node dist/db/migrate.js && node dist/index.js"
  healthcheckPath = "/api/health"
  healthcheckTimeout = 60
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 3
